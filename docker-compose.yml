version: '3.8'

services:
  # Nginx Proxy Manager - Web UI for managing reverse proxy
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nbv-nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '80:80'      # HTTP
      - '443:443'    # HTTPS
      - '81:81'      # Admin Web UI
    environment:
      DB_SQLITE_FILE: "/data/database.sqlite"
      DISABLE_IPV6: 'true'
    volumes:
      - ./data/nginx-proxy-manager/data:/data
      - ./data/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    networks:
      - nbv-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - React Application
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: nbv-frontend
    restart: unless-stopped
    expose:
      - '3000'
    networks:
      - nbv-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend - JSON Server API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nbv-backend
    restart: unless-stopped
    expose:
      - '3005'
    volumes:
      - ./data/db:/data
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DB_PATH=/data/db.json
    networks:
      - nbv-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/users"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  nbv-network:
    name: nbv-network
    driver: bridge

volumes:
  nginx-data:
  letsencrypt:
  db-data: